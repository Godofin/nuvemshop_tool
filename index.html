<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferramentas Nuvemshop - Suite Completa</title>
    
    <!-- CSS Frameworks & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Scripts para a Aba Vue & Lucide -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Estilo personalizado para o scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Utilitários de transição e tabs */
        .tool-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tool-section.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-tab.active {
            border-bottom: 3px solid #2563eb;
            color: #1e40af;
            background-color: #eff6ff;
        }

        /* Ajustes específicos para o Vue dentro da aba */
        #vue-app input, #vue-app textarea, #vue-app select {
            font-family: inherit;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- MENU DE NAVEGAÇÃO (ABAS) -->
    <div class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex space-x-1 overflow-x-auto">
                <button onclick="switchTool('portable')" id="nav-portable" class="nav-tab active flex items-center py-4 px-6 font-semibold text-gray-600 hover:text-blue-600 transition-colors whitespace-nowrap border-b-3 border-transparent">
                    <i class="fa-solid fa-bus mr-2"></i> Gerador de Excursão (Novo)
                </button>
                <button onclick="switchTool('resizer')" id="nav-resizer" class="nav-tab flex items-center py-4 px-6 font-semibold text-gray-600 hover:text-blue-600 transition-colors whitespace-nowrap border-b-3 border-transparent">
                    <i class="fa-solid fa-image mr-2"></i> Redimensionador
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-4 md:p-6">
        
        <!-- ========================================== -->
        <!-- FERRAMENTA 1: GERADOR PORTÁTIL (VUE)       -->
        <!-- ========================================== -->
        <div id="tool-portable" class="tool-section active">
            <!-- Container Vue isolado (ID alterado para vue-app para evitar conflitos) -->
            <div id="vue-app" class="h-[850px] flex flex-col md:flex-row bg-white rounded-lg shadow-2xl overflow-hidden border border-gray-300">
                
                <!-- SIDEBAR / EDITOR -->
                <div class="w-full md:w-5/12 bg-white h-full overflow-y-auto border-r border-slate-200 flex flex-col">
                    <div class="p-6 pb-20 md:pb-6">
                        <h1 class="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                            <i data-lucide="bus" class="w-6 h-6 text-red-600"></i>
                            Editor Visual
                        </h1>

                        <!-- SELETOR DE TEMA -->
                        <div class="mb-8">
                            <label class="block text-sm font-bold text-slate-600 mb-2 uppercase tracking-wide">Estilo do Evento</label>
                            <!-- Grid ajustado para 2 colunas, permitindo visualização de mais temas confortavelmente -->
                            <div class="grid grid-cols-2 gap-2">
                                <button 
                                    v-for="(t, key) in themes" 
                                    :key="key"
                                    @click="theme = key"
                                    class="p-2 rounded-lg text-sm font-medium transition-all"
                                    :class="theme === key ? 'bg-slate-800 text-white shadow-lg scale-105' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'"
                                >
                                    {{ t.name }}
                                </button>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <!-- DADOS GERAIS -->
                            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <h3 class="text-sm font-bold text-slate-500 mb-4 uppercase flex items-center gap-2">
                                    <i data-lucide="info" class="w-4 h-4"></i> Dados Gerais
                                </h3>
                                <div class="space-y-3">
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-500 mb-1">Nome da Excursão</label>
                                        <input v-model="formData.eventName" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                                    </div>
                                    <div class="grid grid-cols-2 gap-3">
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-500 mb-1">Data <span class="text-slate-400 font-normal text-[10px]">(Vazio oculta)</span></label>
                                            <input v-model="formData.date" placeholder="Ex: 21/09/2024" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                                        </div>
                                        <div>
                                            <label class="block text-xs font-semibold text-slate-500 mb-1">Local</label>
                                            <input v-model="formData.location" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-500 mb-1">Intro (Texto destaque)</label>
                                        <textarea v-model="formData.introText" rows="2" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-xs"></textarea>
                                    </div>
                                </div>
                            </div>

                            <!-- PONTOS DE EMBARQUE -->
                            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <div class="flex justify-between items-center mb-4">
                                    <h3 class="text-sm font-bold text-slate-500 uppercase flex items-center gap-2">
                                        <i data-lucide="map-pin" class="w-4 h-4"></i> Embarques
                                    </h3>
                                    <button @click="addStop" class="text-xs bg-green-500 text-white px-2 py-1 rounded hover:bg-green-600 flex items-center gap-1 transition-colors">
                                        <i data-lucide="plus" class="w-3 h-3"></i> Add
                                    </button>
                                </div>
                                
                                <div class="space-y-4">
                                    <div v-for="(stop, index) in formData.stops" :key="index" class="bg-white p-3 rounded shadow-sm border border-slate-200 relative group">
                                        <button @click="removeStop(index)" class="absolute top-2 right-2 text-slate-300 hover:text-red-500 transition-colors" title="Remover">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                        <div class="grid grid-cols-3 gap-2 mb-2 pr-6">
                                            <input placeholder="Horário" v-model="stop.time" class="p-1 border border-slate-200 rounded text-sm">
                                            <input placeholder="Cidade" v-model="stop.city" class="col-span-2 p-1 border border-slate-200 rounded text-sm font-bold">
                                        </div>
                                        <input placeholder="Local específico" v-model="stop.location" class="w-full p-1 border border-slate-200 rounded text-sm mb-2">
                                        <input placeholder="Obs de retorno" v-model="stop.returnLoc" class="w-full p-1 border border-slate-200 rounded text-xs text-slate-500 bg-slate-50">
                                    </div>
                                </div>
                            </div>

                            <!-- DESCRIÇÃO DO SHOW -->
                            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                <h3 class="text-sm font-bold text-slate-500 mb-4 uppercase flex items-center gap-2">
                                    <i data-lucide="music" class="w-4 h-4"></i> Sobre o Show
                                </h3>
                                <div class="space-y-3">
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-500 mb-1">Título do Bloco</label>
                                        <input v-model="formData.showTitle" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-slate-500 mb-1">Descrição Detalhada</label>
                                        <textarea v-model="formData.showDescription" rows="4" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- MAIN CONTENT / PREVIEW -->
                <div class="w-full md:w-7/12 bg-slate-200 h-full flex flex-col">
                    <!-- TOOLBAR -->
                    <div class="bg-white p-3 shadow-sm flex justify-between items-center px-4 md:px-6 z-10">
                        <div class="flex gap-2 bg-slate-100 p-1 rounded-lg">
                            <button @click="activeTab = 'preview'" 
                                class="px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors"
                                :class="activeTab === 'preview' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-800'">
                                <i data-lucide="eye" class="w-4 h-4"></i> <span class="hidden sm:inline">Visualizar</span>
                            </button>
                            <button @click="activeTab = 'code'" 
                                class="px-4 py-2 rounded-md text-sm font-medium flex items-center gap-2 transition-colors"
                                :class="activeTab === 'code' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-800'">
                                <i data-lucide="code" class="w-4 h-4"></i> <span class="hidden sm:inline">Código HTML</span>
                            </button>
                        </div>
                        
                        <button @click="copyToClipboard" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-colors shadow-md hover:shadow-lg">
                            <i data-lucide="copy" class="w-4 h-4"></i> <span id="copyText">Copiar</span>
                        </button>
                    </div>

                    <!-- AREA DE CONTEÚDO -->
                    <div class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-200">
                        <div v-if="activeTab === 'preview'" class="max-w-[800px] mx-auto bg-white shadow-2xl rounded-xl overflow-hidden min-h-[500px]">
                            <div v-html="generatedCode"></div>
                        </div>
                        <div v-else class="max-w-[800px] mx-auto h-full">
                            <textarea readonly class="w-full h-[600px] p-6 font-mono text-sm bg-slate-900 text-green-400 rounded-xl shadow-inner resize-none focus:outline-none" :value="generatedCode"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- FERRAMENTA 2: REDIMENSIONADOR DE IMAGENS   -->
        <!-- ========================================== -->
        <div id="tool-resizer" class="tool-section">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <!-- COLUNA DA ESQUERDA: CONTROLES -->
                <div class="lg:col-span-4 bg-white p-6 rounded-lg shadow-lg h-fit">
                    <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Configuração</h2>
                    
                    <div class="space-y-6">
                        <!-- Input de Arquivo -->
                        <div>
                            <label for="imageInput" class="block text-sm font-medium text-gray-700 mb-2">1. Carregar Imagem</label>
                            <input type="file" id="imageInput" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                        </div>

                        <!-- Seletor de Presets -->
                        <div>
                            <label for="presetSelect" class="block text-sm font-medium text-gray-700 mb-2">2. Escolher Formato (Nuvemshop)</label>
                            <select id="presetSelect" class="w-full p-2 border border-gray-300 rounded-md bg-gray-50 focus:ring-blue-500 focus:border-blue-500 text-gray-800">
                                <option value="custom">✏️ Personalizado (Manual)</option>
                                <option value="1580,450">💻 Banner Rotativo (1580 x 450 px)</option>
                                <option value="1024,1024">👕 Imagem do Produto (1024 x 1024 px)</option>
                                <option value="620,715">🏷️ Banner Promocional/Categoria (620 x 715 px)</option>
                                <option value="300,200">🏢 Marcas (300 x 200 px)</option>
                            </select>
                        </div>

                        <!-- Inputs Manuais -->
                        <div class="grid grid-cols-2 gap-4 p-4 bg-gray-50 rounded-lg border border-gray-200">
                            <div>
                                <label for="widthInput" class="block text-xs font-bold text-gray-500 uppercase mb-1">Largura (px)</label>
                                <input type="number" id="widthInput" placeholder="Ex: 800" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label for="heightInput" class="block text-xs font-bold text-gray-500 uppercase mb-1">Altura (px)</label>
                                <input type="number" id="heightInput" placeholder="Ex: 600" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500">
                            </div>
                        </div>

                        <!-- Botão -->
                        <button id="resizeButton" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg shadow hover:bg-blue-700 transition transform active:scale-95">
                            <i class="fa-solid fa-compress mr-2"></i> Redimensionar Agora
                        </button>

                        <!-- Erro -->
                        <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative text-sm">
                            <span id="error-message-text">Selecione uma imagem primeiro.</span>
                        </div>
                    </div>
                </div>

                <!-- COLUNA DA DIREITA: PREVIEW -->
                <div class="lg:col-span-8 space-y-6">
                    
                    <!-- Preview Original -->
                    <div id="originalContainer" class="hidden bg-white p-4 rounded-lg shadow border border-gray-200">
                        <h3 class="text-sm font-bold text-gray-500 uppercase mb-2">Original</h3>
                        <div class="bg-gray-100 rounded flex justify-center items-center p-2 overflow-hidden">
                            <img id="originalPreview" src="#" alt="Original" class="max-h-64 object-contain shadow-sm">
                        </div>
                    </div>

                    <!-- Preview Redimensionado -->
                    <div id="resizedContainer" class="hidden bg-green-50 p-6 rounded-lg shadow-lg border border-green-200 text-center">
                        <h3 class="text-lg font-bold text-green-800 mb-4">✅ Resultado Gerado</h3>
                        
                        <div class="flex justify-center mb-6">
                            <img id="resizedPreview" src="#" alt="Redimensionada" class="max-h-[400px] w-auto object-contain shadow-lg border-4 border-white rounded">
                        </div>
                        
                        <a id="downloadLink" href="#" download="imagem-redimensionada.png" class="inline-block bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg shadow transition transform hover:-translate-y-1">
                            <i class="fa-solid fa-download mr-2"></i> Baixar Imagem
                        </a>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- SCRIPTS COMBINADOS -->
    <script>
        // ==========================================
        // NAVEGAÇÃO GERAL (ABAS)
        // ==========================================
        function switchTool(toolId) {
            // Remove active class from all sections and buttons
            document.querySelectorAll('.tool-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));

            // Add active class to selected
            document.getElementById(`tool-${toolId}`).classList.add('active');
            document.getElementById(`nav-${toolId}`).classList.add('active');
        }

        // ==========================================
        // FERRAMENTA 2: REDIMENSIONADOR
        // ==========================================
        const imageInput = document.getElementById('imageInput');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const presetSelect = document.getElementById('presetSelect');
        const resizeButton = document.getElementById('resizeButton');
        const originalContainer = document.getElementById('originalContainer');
        const originalPreview = document.getElementById('originalPreview');
        const resizedContainer = document.getElementById('resizedContainer');
        const resizedPreview = document.getElementById('resizedPreview');
        const downloadLink = document.getElementById('downloadLink');
        const errorMessage = document.getElementById('error-message');
        const errorMessageText = document.getElementById('error-message-text');
        let originalImageSrc = null;

        presetSelect.addEventListener('change', function() {
            const val = this.value;
            if (val === 'custom') {
                widthInput.value = '';
                heightInput.value = '';
                widthInput.focus();
            } else {
                const [w, h] = val.split(',');
                widthInput.value = w;
                heightInput.value = h;
            }
        });

        imageInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    originalImageSrc = e.target.result;
                    originalPreview.src = originalImageSrc;
                    originalContainer.classList.remove('hidden');
                    resizedContainer.classList.add('hidden');
                    errorMessage.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        resizeButton.addEventListener('click', () => {
            const width = parseInt(widthInput.value, 10);
            const height = parseInt(heightInput.value, 10);

            if (!originalImageSrc) {
                errorMessageText.textContent = 'Por favor, carregue uma imagem primeiro.';
                errorMessage.classList.remove('hidden');
                return;
            }
            if (!width || !height) {
                errorMessageText.textContent = 'Insira a largura e a altura ou selecione um formato.';
                errorMessage.classList.remove('hidden');
                return;
            }
            
            errorMessage.classList.add('hidden');

            const img = new Image();
            img.src = originalImageSrc;

            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                
                ctx.drawImage(img, 0, 0, width, height);

                const resizedDataUrl = canvas.toDataURL('image/png');
                resizedPreview.src = resizedDataUrl;
                resizedContainer.classList.remove('hidden');
                downloadLink.href = resizedDataUrl;
                
                const originalFileName = imageInput.files[0] ? imageInput.files[0].name : 'imagem';
                const fileNameSemExtensao = originalFileName.split('.').slice(0, -1).join('.');
                downloadLink.download = `${fileNameSemExtensao}_${width}x${height}.png`;
            };

            img.onerror = () => {
                errorMessageText.textContent = 'Erro ao processar a imagem.';
                errorMessage.classList.remove('hidden');
            };
        });

        // ==========================================
        // FERRAMENTA 3: GERADOR PORTÁTIL (VUE.JS)
        // ==========================================
        const { createApp, ref, computed, onUpdated, onMounted } = Vue;

        createApp({
            setup() {
                const activeTab = ref('editor');
                const theme = ref('rock');

                // DADOS INICIAIS
                const formData = ref({
                    eventName: 'AC/DC - Power Up Tour',
                    date: '21/09/2024',
                    location: 'Estádio do Morumbi - SP',
                    introText: 'Prepare-se para uma experiência inesquecível! Nossa excursão garante que sua única preocupação seja aproveitar cada minuto do espetáculo.',
                    returnText: '40 minutos após o término do show.',
                    stops: [
                        { time: '09:00', city: 'ARARAQUARA', location: 'Rodoviária (parte de cima)', returnLoc: 'Retorno no mesmo local' },
                        { time: '09:25', city: 'IBATÉ', location: 'Rotatória do rodeio', returnLoc: 'Retorno no mesmo local' },
                        { time: '09:45', city: 'SÃO CARLOS', location: 'Hospital Universitário (portaria principal)', returnLoc: 'Retorno no mesmo local' },
                        { time: '10:40', city: 'RIO CLARO', location: 'Viviane Veículos', returnLoc: 'Retorno na Rodoviária' },
                        { time: '11:15', city: 'LIMEIRA', location: 'Graal Topázio', returnLoc: 'Retorno no Graal Castelo' },
                        { time: '12:30', city: 'REGIÃO DE CAMPINAS', location: 'Shopping SerrAzul (Shell)', returnLoc: 'Retorno no Posto SerrAzul' },
                    ],
                    showTitle: 'A Lenda do Rock Retorna',
                    showDescription: 'A lendária banda continua sua trajetória de sucesso. Nomeada em homenagem ao mais recente álbum de estúdio da banda — que alcançou o 1º lugar em 21 países — esta turnê levará a banda a alguns dos maiores estádios do continente.',
                    importantNotes: [
                        'Desistência: Não haverá reembolso dos valores pagos.',
                        'Troca de Titularidade: Até 7 dias antes da viagem.',
                        'Tolerância: 10 minutos na saída. No retorno, partida no horário exato.'
                    ]
                });

                // CONFIGURAÇÃO DE TEMAS
                const themes = {
                    rock: {
                        name: 'Rock / Metal',
                        colors: { bg: '#ffffff', containerBorder: '#333333', title: '#2c3e50', accent: '#e74c3c', sectionTitle: '#000000', hr: '#000000', lightBg: '#f2f2f2' },
                        icons: { bullet: ['🎸', '💀', '🤘', '⚡', '🥁', '🔥'], title: '🎤', bus: '🚌', warning: '🔥', check: '🤘' },
                        font: "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif"
                    },
                    pop: {
                        name: 'Pop / Diva',
                        colors: { bg: '#ffffff', containerBorder: '#ff69b4', title: '#d63384', accent: '#ff007f', sectionTitle: '#9b59b6', hr: '#ffb6c1', lightBg: '#fff0f5' },
                        icons: { bullet: ['✨', '🌟', '💖', '🎤', '🌈', '💃'], title: '✨', bus: '🚌', warning: '🚨', check: '✅' },
                        font: "'Helvetica Neue', Helvetica, Arial, sans-serif"
                    },
                    pop_masculino: {
                        name: 'Pop Masculino',
                        colors: { bg: '#ffffff', containerBorder: '#1e3a8a', title: '#1e40af', accent: '#0ea5e9', sectionTitle: '#0369a1', hr: '#bae6fd', lightBg: '#f0f9ff' },
                        icons: { bullet: ['🕺', '🎤', '🕶️', '🔥', '💫', '🎶'], title: '🎙️', bus: '🚐', warning: '⚠️', check: '✔️' },
                        font: "'Inter', 'Helvetica Neue', Helvetica, sans-serif"
                    },
                    kpop: {
                        name: 'K-Pop',
                        colors: { bg: '#ffffff', containerBorder: '#dda0dd', title: '#8e44ad', accent: '#9b59b6', sectionTitle: '#be93d4', hr: '#e6e6fa', lightBg: '#f8f4ff' },
                        icons: { bullet: ['🫰', '💜', '🐰', '🎀', '🍭', '☁️'], title: '🫶', bus: '🚌', warning: '⚠️', check: '🍬' },
                        font: "'Comic Sans MS', 'Chalkboard SE', sans-serif"
                    },
                    sertanejo: {
                        name: 'Sertanejo / Agro',
                        colors: { bg: '#ffffff', containerBorder: '#8b4513', title: '#5c4033', accent: '#d2691e', sectionTitle: '#a0522d', hr: '#deb887', lightBg: '#fff8dc' },
                        icons: { bullet: ['🤠', '🐴', '👢', '🎸', '🍻', '🌾'], title: '🪗', bus: '🚌', warning: '🚧', check: '👍' },
                        font: "'Trebuchet MS', 'Lucida Sans Unicode', sans-serif"
                    },
                    festival: {
                        name: 'Festival / Vibes',
                        colors: { bg: '#ffffff', containerBorder: '#27ae60', title: '#d35400', accent: '#e67e22', sectionTitle: '#16a085', hr: '#f1c40f', lightBg: '#f9fff9' },
                        icons: { bullet: ['🌻', '⛺', '🎡', '☮️', '☀️', '🍄'], title: '🎪', bus: '🚌', warning: '🌵', check: '🌿' },
                        font: "'Courier New', Courier, monospace"
                    }
                };

                // FUNÇÕES
                const addStop = () => {
                    formData.value.stops.push({ time: '', city: '', location: '', returnLoc: '' });
                };

                const removeStop = (index) => {
                    formData.value.stops = formData.value.stops.filter((_, i) => i !== index);
                };

                // GERADOR DE CÓDIGO
                const generatedCode = computed(() => {
                    const t = themes[theme.value];
                    const getIcon = (idx) => t.icons.bullet[idx % t.icons.bullet.length];

                    let stopsHtml = formData.value.stops.map((stop, index) => `
        <li style="margin-bottom: 15px; border-bottom: 1px dotted #ccc; padding-bottom: 5px;">
           <span style="font-size: 1.2em;">${getIcon(index)}</span> 
           <strong>${stop.city.toUpperCase()} – ${stop.time}</strong> | ${stop.location}
           ${stop.returnLoc ? `<br><small style="color: #666; margin-left: 25px;">↪ ${stop.returnLoc}</small>` : ''}
        </li>`).join('');

                    let notesHtml = formData.value.importantNotes.map(note => `<p style="margin: 5px 0;">❌ ${note}</p>`).join('');

                    return `
<div style="font-family: ${t.font}; line-height: 1.6; color: #333; max-width: 800px; margin: auto; border: 1px solid #eee; padding: 20px; border-radius: 10px; background-color: ${t.colors.bg};">

    <!-- CABEÇALHO -->
    <h2 style="color: ${t.colors.title}; border-bottom: 3px solid ${t.colors.accent}; padding-bottom: 10px;">
       ${t.icons.title} Informações do Show
    </h2>
    <p><strong>Evento:</strong> ${formData.value.eventName}</p>
    ${formData.value.date ? `<p><strong>Data da Viagem:</strong> ${formData.value.date}</p>` : ''}
    <p><strong>Local do Evento:</strong> ${formData.value.location}</p>
    
    <p style="background-color: ${t.colors.lightBg}; padding: 15px; border-left: 5px solid ${t.colors.accent}; border-radius: 4px; font-style: italic;">
        ${formData.value.introText}
    </p>

    <hr style="margin: 30px 0; border: 0; border-top: 1px dashed ${t.colors.hr};">

    <!-- EMBARQUES -->
    <h3 style="color: ${t.colors.sectionTitle}; text-transform: uppercase;">${t.icons.bus} Pontos de Embarque / Horários</h3>
    <ul style="list-style: none; padding: 0;">
        ${stopsHtml}
    </ul>
    <p><strong>🕒 Retorno:</strong> ${formData.value.returnText}</p>

    <!-- INCLUSO -->
    <h3 style="color: ${t.colors.sectionTitle}; text-transform: uppercase;">${t.icons.check} Incluso no pacote</h3>
    <ul style="list-style: none; padding-left: 0;">
        <li>✅ Transporte ida e volta (Licenciado).</li>
        <li>✅ Guia de turismo acompanhando.</li>
        <li>✅ Seguro viagem.</li>
        <li>✅ Empresa credenciada Cadastur.</li>
    </ul>

    <!-- IMPORTANTE -->
    <div style="background-color: #fff3f3; border: 1px solid #ffcccc; padding: 15px; border-radius: 5px; margin: 20px 0;">
        <h3 style="color: #c0392b; margin-top: 0; text-transform: uppercase;">${t.icons.warning} Importante</h3>
        <div style="font-size: 0.9em; color: #555;">
            ${notesHtml}
            <p style="margin-top: 10px;">📄 <strong>Guarde seu comprovante, ele vale como recibo oficial.</strong></p>
        </div>
    </div>

    <!-- DESCRIÇÃO DO SHOW (DIVISÃO INFERIOR) -->
    <div style="margin-top: 40px; border-top: 4px solid ${t.colors.accent}; padding-top: 20px;">
        <h2 style="color: ${t.colors.accent}; text-transform: uppercase; margin-bottom: 10px;">${formData.value.showTitle}</h2>
        <div style="color: #444;">
            <p>${formData.value.showDescription.replace(/\n/g, '<br>')}</p>
        </div>
    </div>

    <p style="text-align: center; margin-top: 30px; font-weight: bold; color: ${t.colors.accent}; font-size: 0.9em;">
        ${t.icons.bullet[0]} Em caso de adiamento do show, a excursão acontece na nova data. Show adiado não gera reembolso. ${t.icons.bullet[0]}
    </p>
</div>`;
                });

                const copyToClipboard = () => {
                    navigator.clipboard.writeText(generatedCode.value);
                    const btnText = document.getElementById('copyText');
                    const originalText = btnText.innerText;
                    btnText.innerText = 'Copiado!';
                    setTimeout(() => btnText.innerText = originalText, 1500);
                };

                onUpdated(() => {
                    lucide.createIcons();
                });
                
                onMounted(() => {
                    lucide.createIcons();
                });

                return {
                    activeTab,
                    theme,
                    themes,
                    formData,
                    addStop,
                    removeStop,
                    generatedCode,
                    copyToClipboard
                };
            }
        }).mount('#vue-app');
    </script>
</body>
</html>
